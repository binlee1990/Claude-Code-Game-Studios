# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: logic_object_lifecycle
    status: active
    api: "RefCounted + constructor/method injection"
    not: "Autoload singleton, Node-based manager, static utility class"
    adr: docs/architecture/adr-0002-dependency-injection-architecture.md
    reason: "DI makes dependencies explicit (testable, refactorable). Autoloads hide coupling. Nodes tie logic to scene tree lifecycle."
    referenced_by:
      - docs/architecture/adr-0002-dependency-injection-architecture.md
    added: 2026-04-30
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: inline_tile_size_math
    status: active
    description: "No file outside src/core/grid_space.gd may use `* TILE_SIZE`, `* 64`, `/ TILE_SIZE`, or `/ 64` for coordinate conversion. Use GridSpace.world_to_grid() / grid_to_world() instead."
    why: "Coordinate math scattered across systems creates brittle coupling — changing tile size requires N-file edits. Violates System Orthogonality (Pillar 2). Identified as Technical Risk R4 in game-concept.md."
    adr: docs/architecture/adr-0001-gridspace-coordinate-boundary.md
    added: 2026-04-30

  - pattern: refcounted_node_access
    status: active
    description: "RefCounted logic classes must not call get_node(), $NodePath, %, get_tree(), or reference Autoloads. Dependencies must come through constructor/method injection."
    why: "Node access in RefCounted creates hidden coupling to scene tree — untestable and violates System Orthogonality. The composition root (Game scene) owns all wiring."
    adr: docs/architecture/adr-0002-dependency-injection-architecture.md
    added: 2026-04-30


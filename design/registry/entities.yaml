# --- FORMULAS ---------------------------------------------------------------
# Named calculations with defined variables and output ranges.
# Registered when output feeds into another system's input.

formulas:
  - name: attribute_growth
    status: active
    source: design/gdd/attribute-growth-system.md
    referenced_by:
      - design/gdd/attribute-growth-system.md
      - design/gdd/class-system.md
      - design/gdd/battle-settlement.md
    variables:
      - V_old (int [0,999])
      - P_current (int [1,6])
    output_range: [1, 6]
    expression: "V_new = V_old + P_current"
    constraints: "壁障截断和999硬顶"
    added: "2026-04-22"
    revised: ""

  - name: crush_evaluation
    status: active
    source: design/gdd/attribute-growth-system.md
    referenced_by:
      - design/gdd/attribute-growth-system.md
      - design/gdd/tactical-mechanism.md
      - design/gdd/ai-system.md
    variables:
      - V_attacker (int [0,999])
      - V_defender (int [0,999])
    output_range: "bool + {1.0, 1.5} damage_mult + {1.0, 0.8} defense_mult"
    expression: "|V_attacker - V_defender| > 30 → crush"
    added: "2026-04-22"
    revised: ""

  - name: class_unlock
    status: active
    source: design/gdd/class-system.md
    referenced_by:
      - design/gdd/class-system.md
      - design/gdd/equipment-system.md
    variables:
      - V_primary_attribute (int [0,999])
      - V_secondary_attribute (int [0,999])
      - class_experience (int [0,+∞))
    output_range: "bool"
    expression: "CAN_UNLOCK = (V_pa >= 50) AND (V_sa >= 40) AND (exp >= 500)"
    added: "2026-04-22"
    revised: ""

  - name: class_exp_gain
    status: active
    source: design/gdd/class-system.md
    referenced_by:
      - design/gdd/class-system.md
      - design/gdd/battle-settlement.md
    variables:
      - damage_dealt (int [0,+∞))
      - is_kill (bool)
    output_range: [20, 530]
    expression: "min(floor(damage_dealt × 0.02), 500) + kill_bonus(0/10) + battle_bonus(20)"
    added: "2026-04-22"
    revised: ""

  - name: gold_gain
    status: active
    source: design/gdd/resource-economy.md
    referenced_by:
      - design/gdd/resource-economy.md
      - design/gdd/battle-settlement.md
    variables:
      - base_reward (int [50,200])
      - damage_dealt (int [0,+∞))
      - is_boss_kill (bool)
    output_range: [50, 2000]
    expression: "base_reward + floor(damage_dealt × 0.1) + kill_bonus(0/20)"
    added: "2026-04-22"
    revised: ""

  - name: enhancement_cost_safe_zone
    status: active
    source: design/gdd/resource-economy.md
    referenced_by:
      - design/gdd/resource-economy.md
      - design/gdd/equipment-system.md
    variables:
      - base_cost (int 100)
      - current_enhance_level (int [0,4])
      - target_level (int [1,5])
    output_range: "gold [100,500], materials [5,25]"
    expression: "gold = 100 × (level+1); materials = 5 × target_level"
    notes: "仅适用于+1~+5安全区。+6以上见equipment-system C.4表格。"
    added: "2026-04-22"
    revised: ""

  - name: triangle_damage_multiplier
    status: active
    source: design/gdd/tactical-mechanism.md
    referenced_by:
      - design/gdd/tactical-mechanism.md
      - design/gdd/ai-system.md
      - design/gdd/attribute-growth-system.md
    variables:
      - base_multiplier ({1.0, 1.5})
      - crush_multiplier ({1.0, 1.5})
    output_range: [1.0, 2.25]
    expression: "final_multiplier = base_multiplier × crush_multiplier"
    added: "2026-04-22"
    revised: ""

  - name: final_attribute
    status: active
    source: design/gdd/equipment-system.md
    referenced_by:
      - design/gdd/equipment-system.md
      - design/gdd/class-system.md
      - design/gdd/attribute-growth-system.md
    variables:
      - base_value (int [0,999])
      - class_bonus (int)
      - equipment_bonus (int)
      - barrier_bonus (int)
    expression: "final_attr = base_value + class_bonus + equipment_bonus + barrier_bonus"
    added: "2026-04-22"
    revised: ""

  - name: threat_score
    status: active
    source: design/gdd/ai-system.md
    referenced_by:
      - design/gdd/ai-system.md
      - design/gdd/boss-system.md
    variables:
      - base_threat (float [0,1])
      - damage_dealt_recent (int)
      - skill_threat (int {0,5,10,15,20})
      - position_threat (int {0,5,10})
    output_range: [0, +∞)
    expression: "base_threat + damage_recent×0.1 + skill_threat + position_threat"
    added: "2026-04-22"
    revised: ""

  - name: skill_damage
    status: active
    source: design/gdd/skill-system.md
    referenced_by:
      - design/gdd/skill-system.md
      - design/gdd/turn-based-mode.md
    variables:
      - base_damage (int)
      - level (int [1,99])
      - trait_multiplier (float)
      - attribute_bonus (float)
    expression: "base_damage × (1+(level-1)×0.1) × trait_multiplier × (1+attribute_bonus)"
    added: "2026-04-22"
    revised: ""

  - name: exp_distribution
    status: active
    source: design/gdd/battle-settlement.md
    referenced_by:
      - design/gdd/battle-settlement.md
      - design/gdd/attribute-growth-system.md
    variables:
      - total_exp (int)
      - surviving_units (int [1,4])
    expression: "exp_per_unit = total_exp / surviving_units"
    added: "2026-04-22"
    revised: ""

  - name: bond_affinity_gain
    status: active
    source: design/gdd/bond-system.md
    referenced_by:
      - design/gdd/bond-system.md
      - design/gdd/battle-settlement.md
    variables:
      - base_gain (int [2,50])
      - proximity_modifier (float [0.5,1.0])
      - type_affinity (float [0.8,1.3])
    expression: "affinity_gain = base_gain × proximity_modifier × type_affinity"
    added: "2026-04-22"
    revised: ""

  - name: difficulty_scaling
    status: active
    source: design/gdd/difficulty-system.md
    referenced_by:
      - design/gdd/difficulty-system.md
      - design/gdd/boss-system.md
      - design/gdd/ai-system.md
    variables:
      - base_stat (float)
      - difficulty_multiplier (float {1,2,4,8,16})
    expression: "scaled_stat = base_stat × difficulty_multiplier"
    added: "2026-04-22"
    revised: ""

  - name: boss_phase_trigger
    status: active
    source: design/gdd/boss-system.md
    referenced_by:
      - design/gdd/boss-system.md
      - design/gdd/ai-system.md
    variables:
      - boss_max_hp (int)
      - phase_threshold (float {0.50, 0.25})
    expression: "phase_trigger = boss_max_hp × threshold"
    notes: "Phase 1→2 at 50% HP, Phase 2→3 at 25% HP"
    added: "2026-04-22"
    revised: ""



# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas: []

# Example:
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD scales attack variable
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "Output feeds into health-system damage intake. Min is 0 (armour
#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: item_rarity_enum
    status: active
    source: design/gdd/item-material-system.md
    referenced_by:
      - design/gdd/item-material-system.md
    value:
      - fanpin       # 凡品（MVP material 全部使用此值）
      - jingliang    # 精良
      - xiyou        # 稀有
      - shishi       # 史诗
      - chuanshuo    # 传说
      - shenhua      # 神话
      - xiantian     # 先天
      - hundun       # 混沌
    unit: enum_strings
    notes: "8 元修仙稀有度枚举，与 game-concept.md §9 #108 装备品质 8 级一致。HUD GDD 据此定义 RGB 颜色映射；本 GDD 仅锁定字符串集合。任何 GDD 引入新稀有度字符串前应先在此追加。"
    added: 2026-05-03
    revised: ""

  - name: item_class_enum
    status: active
    source: design/gdd/item-material-system.md
    referenced_by:
      - design/gdd/item-material-system.md
    value:
      - resource_material   # MVP 唯一使用的类别
      - consumable          # Alpha 预留
      - equipment           # Alpha 预留
      - quest               # Alpha 预留
    unit: enum_strings
    notes: "4 元 ItemRegistry item_class 字段锁定枚举（**字段名为 item_class 而非 category**——/design-review 2026-05-03 将字段重命名以避免与 ResourceSystem.category 在共享 id 命名空间下的语义分叉；旧名 item_category_enum 重命名为 item_class_enum）。MVP 仅用 resource_material。Alpha 引入新类别前必须在此追加，否则 ItemRegistry 加载会拒绝。注意 ItemRegistry.item_class 与 ResourceSystem.category（regenerative/material/progress/currency）不同维度——前者按物品大类分，后者按数量行为分。"
    added: 2026-05-03
    revised: 2026-05-03


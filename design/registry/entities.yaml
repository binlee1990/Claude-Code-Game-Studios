# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: level_exp
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - EXP_BASE
      - EXP_GROWTH
      - EXP_SOFTCAP_LV
      - EXP_SOFTCAP_POW
    output_range: [10, 3000000]
    expression: "EXP_BASE * pow(level, 2.0) * pow(EXP_GROWTH, softcap(level, EXP_SOFTCAP_LV, EXP_SOFTCAP_POW))"
    notes: "升级到下一级所需 exp 阈值。默认参数 EXP_BASE=10.0, EXP_GROWTH=1.038, EXP_SOFTCAP_LV=80, EXP_SOFTCAP_POW=0.55。Lv.99 实际节奏 ~6 小时（非早期目标 3 天）；MVP 多日体验由 Lv.100-200 多级累加提供。L30 偏差 -24% 在调参安全范围内"
    added: 2026-05-04
    revised: ""

  - name: hp_max_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [100, 1000000]
    expression: "clamp(log_softcap(100.0 * pow(level, 1.8) * (1.0 + realm_id * 0.15), 80000.0), 100.0, 1000000.0)"
    notes: "玩家 hp_max 属性成长公式。Lv.1 凡人 = 100；Lv.200 合体 ≈ 1.3e5。clamp 上界与 attribute-system.md hp_max recommended_range 一致。写入 AttributeSystem.set_base"
    added: 2026-05-04
    revised: ""

  - name: atk_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [10, 1000000]
    expression: "clamp(log_softcap(10.0 * pow(level, 1.75) * (1.0 + realm_id * 0.12), 8000.0), 10.0, 1000000.0)"
    notes: "玩家 atk 属性成长公式。Lv.1 凡人 = 10；Lv.200 合体 ≈ 1.1e4。写入 AttributeSystem.set_base"
    added: 2026-05-04
    revised: ""

  - name: def_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [5, 1000000]
    expression: "clamp(log_softcap(5.0 * pow(level, 1.7) * (1.0 + realm_id * 0.10), 4000.0), 5.0, 1000000.0)"
    notes: "玩家 def 属性成长公式。Lv.1 凡人 = 5；Lv.200 合体 ≈ 5000。早期成长慢于 atk（玻璃炮体感设计意图，pillar 4.2）"
    added: 2026-05-04
    revised: ""

  - name: spd_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [10, 1000]
    expression: "clamp(log_softcap(10.0 * pow(level, 1.35) * (1.0 + realm_id * 0.06), 700.0), 10.0, 1000.0)"
    notes: "玩家 spd 属性成长公式。Lv.1 = 10；Lv.200 合体 ≈ 958。clamp 1000 严格硬边界（与 attribute-system.md spd recommended_range 上限一致）"
    added: 2026-05-04
    revised: ""

  - name: crit_rate_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [0.0, 1.0]
    expression: "clamp(log_softcap(0.05 + 0.003 * pow(level, 1.1) * (1.0 + realm_id * 0.04), 0.6), 0.0, 1.0)"
    notes: "玩家 crit_rate 基础值成长公式。Lv.1 起点 0.05；Lv.200 合体裸值 ≈ 0.37。clamp 严格 ≤ 1.0 防 NaN。剩余至 100% 由装备/天赋通过 ModifierEngine 叠加（设计意图：留装备价值空间）"
    added: 2026-05-04
    revised: ""

  - name: crit_dmg_growth
    status: active
    source: design/gdd/level-system.md
    referenced_by:
      - design/gdd/level-system.md
    variables:
      - level
      - realm_id
    output_range: [1.0, 100.0]
    expression: "clamp(log_softcap(1.5 + 0.025 * pow(level, 1.15) * (1.0 + realm_id * 0.05), 6.0), 1.0, 100.0)"
    notes: "玩家 crit_dmg 属性成长公式。Lv.1 起点 1.5（×1.5 倍）；Lv.200 合体 ≈ 5.0"
    added: 2026-05-04
    revised: ""

